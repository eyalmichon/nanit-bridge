services:
  nanit-bridge:
    image: ghcr.io/eyalmichon/nanit-bridge:${NANIT_VERSION:-latest}
    container_name: nanit-bridge
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "8080:8080"
    volumes:
      - nanit-data:/data
    healthcheck:
      test: ["CMD", "/nanit-bridge", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      NANIT_EMAIL: "${NANIT_EMAIL}"
      NANIT_PASSWORD: "${NANIT_PASSWORD}"
      NANIT_RTMP_ADDR: "${NANIT_RTMP_ADDR}"
      NANIT_RTMP_PORT: "1935"
      NANIT_HTTP_PORT: "${NANIT_HTTP_PORT:-8080}"
      NANIT_SENSOR_POLL_SEC: "${NANIT_SENSOR_POLL_SEC:-30}"
      NANIT_MQTT_BROKER_URL: "${NANIT_MQTT_BROKER_URL:-}"
      NANIT_MQTT_USERNAME: "${NANIT_MQTT_USERNAME:-}"
      NANIT_MQTT_PASSWORD: "${NANIT_MQTT_PASSWORD:-}"
      NANIT_MQTT_PREFIX: "${NANIT_MQTT_PREFIX:-nanit}"
      NANIT_SESSION_FILE: "/data/session.json"
      NANIT_PUSH_CREDS_FILE: "/data/push_creds.json"
      NANIT_DASHBOARD_AUTH_FILE: "/data/dashboard_password.hash"
      NANIT_DASHBOARD_PASSWORD: "${NANIT_DASHBOARD_PASSWORD:-}"
      NANIT_RTMP_TOKEN: "${NANIT_RTMP_TOKEN:-}"
      NANIT_RTMP_TOKEN_FILE: "/data/rtmp_token"
      NANIT_LOG_LEVEL: "${NANIT_LOG_LEVEL:-info}"

volumes:
  nanit-data:

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nanit-bridge</title>
  <link rel="stylesheet" href="/shared/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
</head>
<body>
  <header>
    <h1>nanit-bridge</h1>
    <div class="header-right">
      <div class="ws-status">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">connecting...</span>
      </div>
      <button class="logout-btn" id="logoutBtn" title="Sign out">Sign out</button>
    </div>
  </header>
  <div id="babies">
    <div class="empty-state" id="emptyState">
      <h2>Waiting for data...</h2>
      <p>Connecting to nanit-bridge WebSocket</p>
    </div>
  </div>
  <div class="log-panel collapsed" id="logPanel">
    <div class="log-header" id="logHeader">
      <span class="log-title">Logs</span>
      <span class="log-badge" id="logBadge"></span>
      <span class="log-toggle" id="logToggle">&#9650;</span>
    </div>
    <div class="log-body" id="logBody">
      <pre id="logContent"></pre>
    </div>
  </div>
  <script src="/dashboard/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nanit-bridge</title>
  <link rel="stylesheet" href="/shared/style.css">
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
</head>
<body>
  <header>
    <h1>nanit-bridge</h1>
    <div class="header-right">
      <div class="ws-status">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">connecting...</span>
      </div>
      <a class="nav-link-btn" href="/settings" title="Settings">Settings</a>
      <button class="logout-btn" id="logoutBtn" title="Sign out">Sign out</button>
    </div>
  </header>
  <div id="babies">
    <div class="empty-state" id="emptyState">
      <h2>Waiting for data...</h2>
      <p>Connecting to nanit-bridge WebSocket</p>
    </div>
  </div>
  <div class="log-panel collapsed" id="logPanel">
    <div class="log-header" id="logHeader">
      <span class="log-title">Logs</span>
      <span class="log-badge" id="logBadge"></span>
      <span class="log-toggle" id="logToggle">&#9650;</span>
    </div>
    <div class="log-body" id="logBody">
      <pre id="logContent"></pre>
    </div>
  </div>
  <div class="auth-modal hidden" id="nanitAuthModal">
    <div class="auth-modal-card">
      <h2>Nanit connection required</h2>
      <p id="nanitAuthHint">Reconnect your Nanit account to resume camera streaming and controls.</p>

      <form id="nanitLoginForm" class="settings-form">
        <label for="nanitEmail">Email</label>
        <input type="email" id="nanitEmail" autocomplete="username" required>
        <label for="nanitPassword">Password</label>
        <input type="password" id="nanitPassword" autocomplete="current-password" required>
        <button type="submit" class="primary-btn" id="nanitLoginBtn">Connect</button>
      </form>

      <form id="nanitMfaForm" class="settings-form hidden">
        <label for="nanitMfaCode">MFA code</label>
        <input type="text" id="nanitMfaCode" inputmode="numeric" autocomplete="one-time-code" required>
        <button type="submit" class="primary-btn" id="nanitMfaBtn">Verify MFA</button>
      </form>

      <p class="form-error hidden" id="nanitAuthError"></p>
      <p class="form-success hidden" id="nanitAuthSuccess"></p>
    </div>
  </div>
  <script src="/dashboard/app.js"></script>
</body>
</html>

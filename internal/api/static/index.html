<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nanit-bridge</title>
<script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --green: #22c55e;
    --red: #ef4444;
    --amber: #f59e0b;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }
  header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; }
  .ws-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .ws-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); transition: background 0.3s;
  }
  .ws-dot.connected { background: var(--green); }

  #babies { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card-body { padding: 1.25rem; }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .card-header h2 { font-size: 1.15rem; font-weight: 600; }
  .card-header .uid {
    font-size: 0.75rem; color: var(--muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  .video-container {
    position: relative;
    background: #000;
    aspect-ratio: 16/9;
    width: 100%;
  }
  .video-container video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .video-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.6);
    color: var(--muted);
    font-size: 0.85rem;
  }
  .video-overlay.hidden { display: none; }

  .badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.2rem 0.6rem; border-radius: 6px;
    font-size: 0.7rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-amber { background: rgba(245,158,11,0.15); color: var(--amber); }
  .badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }

  .sensors {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 1rem;
  }
  .sensor {
    text-align: center;
    padding: 0.6rem 0.4rem;
    background: var(--bg);
    border-radius: 8px;
  }
  .sensor-label {
    font-size: 0.7rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }
  .sensor-value {
    font-size: 1.5rem; font-weight: 700;
    font-variant-numeric: tabular-nums; line-height: 1.2;
  }
  .sensor-unit { font-size: 0.75rem; font-weight: 400; color: var(--muted); }

  .alerts { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .alert-item {
    display: flex; align-items: center; gap: 0.4rem;
    padding: 0.35rem 0.65rem; border-radius: 6px;
    font-size: 0.8rem; background: var(--bg);
  }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; }
  .alert-dot.on { background: var(--amber); }
  .alert-dot.off { background: var(--muted); }

  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .control-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0.7rem;
    background: var(--bg);
    border-radius: 8px;
    font-size: 0.8rem;
  }
  .control-item.wide { grid-column: 1 / -1; }
  .control-label { color: var(--muted); font-size: 0.75rem; }

  .section-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 0.5rem;
    padding-top: 0.75rem;
  }
  .notif-group {
    background: var(--bg);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
    margin-bottom: 0.5rem;
  }
  .notif-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.8rem;
  }
  .notif-group-header .control-label { font-size: 0.8rem; font-weight: 500; color: var(--text); }
  .notif-group-slider {
    margin-top: 0.4rem;
    padding-top: 0.4rem;
    border-top: 1px solid var(--border);
  }
  .sens-label { font-size: 0.65rem; color: var(--muted); }

  .toggle {
    position: relative;
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    padding: 0;
  }
  .toggle.on { background: var(--accent); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(16px); }

  .volume-slider {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .volume-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
  }
  .volume-val {
    font-size: 0.8rem;
    font-variant-numeric: tabular-nums;
    min-width: 2em;
    text-align: right;
  }

  .track-select {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.5rem;
    font-size: 0.75rem;
    cursor: pointer;
    max-width: 160px;
  }
  .track-select:focus { outline: 1px solid var(--accent); }
  .track-label {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.15rem;
  }

  .last-update {
    font-size: 0.7rem; color: var(--muted);
    text-align: right; margin-top: 0.75rem;
  }

  .empty-state {
    text-align: center; padding: 4rem 2rem; color: var(--muted);
  }
  .empty-state h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .updating .card-body { animation: pulse 0.4s ease-in-out; }
</style>
</head>
<body>
<header>
  <h1>nanit-bridge</h1>
  <div class="ws-status">
    <div class="ws-dot" id="wsDot"></div>
    <span id="wsLabel">connecting...</span>
  </div>
</header>
<div id="babies">
  <div class="empty-state" id="emptyState">
    <h2>Waiting for data...</h2>
    <p>Connecting to nanit-bridge WebSocket</p>
  </div>
</div>
<script>
(function() {
  var babiesEl = document.getElementById('babies');
  var emptyState = document.getElementById('emptyState');
  var wsDot = document.getElementById('wsDot');
  var wsLabel = document.getElementById('wsLabel');
  var babies = {};
  var players = {};
  var notifSettings = {};
  var ws;
  var reconnectDelay = 1000;

  function scheduleReconnect() {
    wsDot.classList.remove('connected');
    wsLabel.textContent = 'reconnecting...';
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 10000);
  }

  function connect() {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var closing = false;

    try {
      ws = new WebSocket(proto + '//' + location.host + '/ws');
    } catch(e) {
      scheduleReconnect();
      return;
    }

    ws.onopen = function() {
      wsDot.classList.add('connected');
      wsLabel.textContent = 'live';
      reconnectDelay = 1000;
    };

    ws.onerror = function() {
      if (!closing) {
        closing = true;
        try { ws.close(); } catch(e) {}
        scheduleReconnect();
      }
    };

    ws.onclose = function() {
      if (!closing) {
        closing = true;
        scheduleReconnect();
      }
    };

    ws.onmessage = function(e) {
      var msg = JSON.parse(e.data);
      if (msg.type === 'initial') {
        babies = {};
        (msg.babies || []).forEach(function(b) { babies[b.uid] = b; });
        // Destroy all players — server restarted, streams need re-establishing.
        Object.keys(players).forEach(destroyPlayer);
        renderAll();
      } else if (msg.type === 'state_update') {
        var prev = babies[msg.baby.uid];
        babies[msg.baby.uid] = msg.baby;
        updateCard(msg.baby.uid, prev);
      }
    };
  }

  function renderAll() {
    var uids = Object.keys(babies);
    if (uids.length === 0) {
      emptyState.style.display = '';
      return;
    }
    emptyState.style.display = 'none';
    babiesEl.querySelectorAll('.card').forEach(function(el) {
      if (!babies[el.dataset.uid]) {
        destroyPlayer(el.dataset.uid);
        el.remove();
      }
    });
    uids.forEach(function(uid) { updateCard(uid, null); });
  }

  function sendControl(uid, action, value) {
    fetch('/api/babies/' + uid + '/control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: action, value: value })
    }).catch(function(e) { console.error('control error:', e); });
  }

  function fetchNotifSettings(uid) {
    fetch('/api/babies/' + uid + '/notification_settings')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        notifSettings[uid] = d.settings || {};
        renderNotifToggles(uid);
      })
      .catch(function(e) { console.error('notif settings error:', e); });
  }

  function toggleNotifSetting(uid, key) {
    var cur = notifSettings[uid] && notifSettings[uid][key];
    var newVal = !cur;
    if (notifSettings[uid]) notifSettings[uid][key] = newVal;
    renderNotifToggles(uid);
    fetch('/api/babies/' + uid + '/notification_settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key: key, enabled: newVal })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      notifSettings[uid] = d.settings || {};
      renderNotifToggles(uid);
    })
    .catch(function(e) { console.error('toggle notif error:', e); });
  }

  function renderNotifToggles(uid) {
    renderNotifCards(uid);
  }

  var lastSliderValues = {};

  function renderNotifCards(uid, soundSlider, motionSlider) {
    var el = document.getElementById('notif-cards-' + uid);
    if (!el) return;
    var ns = notifSettings[uid] || {};
    if (soundSlider !== undefined) lastSliderValues[uid] = { sound: soundSlider, motion: motionSlider };
    var sv = lastSliderValues[uid] || { sound: 4, motion: 12 };

    var groups = [
      { key: 'SOUND', label: 'Sound Alerts', sensId: 'ctrl-sound-sens-' + uid, sensMin: 0, sensMax: 7, sensVal: sv.sound },
      { key: 'MOTION', label: 'Motion Alerts', sensId: 'ctrl-motion-sens-' + uid, sensMin: 0, sensMax: 24, sensVal: sv.motion },
      { key: 'CAMERA_CRY_DETECTION', label: 'Cry Detection', sensId: null }
    ];

    var html = '';
    for (var i = 0; i < groups.length; i++) {
      var g = groups[i];
      var on = ns[g.key] === true;
      html += '<div class="notif-group">';
      html += '<div class="notif-group-header">';
      html += '<span class="control-label">' + g.label + '</span>';
      html += '<button class="toggle ' + (on ? 'on' : '') + '" data-uid="' + uid + '" data-key="' + g.key + '"></button>';
      html += '</div>';
      if (g.sensId) {
        html += '<div class="notif-group-slider">';
        html += '<div class="volume-row">';
        html += '<span class="sens-label">Less</span>';
        html += '<input type="range" class="volume-slider" id="' + g.sensId + '" min="' + g.sensMin + '" max="' + g.sensMax + '" value="' + g.sensVal + '">';
        html += '<span class="sens-label">More</span>';
        html += '</div>';
        html += '</div>';
      }
      html += '</div>';
    }

    el.innerHTML = html;

    el.querySelectorAll('.toggle').forEach(function(btn) {
      btn.onclick = function() {
        toggleNotifSetting(this.dataset.uid, this.dataset.key);
      };
    });

    var soundSens = document.getElementById('ctrl-sound-sens-' + uid);
    if (soundSens) {
      soundSens.onchange = function() {
        var sliderVal = parseInt(this.value);
        var sensorVal = 9 - sliderVal;
        sendControl(uid, 'sound_sensitivity', sensorVal);
      };
    }

    var motionSens = document.getElementById('ctrl-motion-sens-' + uid);
    if (motionSens) {
      motionSens.onchange = function() {
        var sliderVal = parseInt(this.value);
        var sensorVal = 250000 - (sliderVal * 10000);
        sendControl(uid, 'motion_sensitivity', sensorVal);
      };
    }
  }

  // Track pending control states so sensor re-renders don't reset toggles
  // before the camera confirms the new state.
  var pendingControls = {};

  function setPending(uid, key, value) {
    if (!pendingControls[uid]) pendingControls[uid] = {};
    pendingControls[uid][key] = { value: value, ts: Date.now() };
  }

  function getControlValue(uid, key, serverValue) {
    var p = pendingControls[uid] && pendingControls[uid][key];
    if (p && (Date.now() - p.ts) < 5000) {
      return p.value;
    }
    // Server confirmed or timeout — clear pending.
    if (p) delete pendingControls[uid][key];
    return serverValue;
  }

  function ensureCard(uid) {
    var card = babiesEl.querySelector('.card[data-uid="' + uid + '"]');
    if (!card) {
      card = document.createElement('div');
      card.className = 'card';
      card.dataset.uid = uid;
      card.innerHTML =
        '<div class="video-container">' +
          '<video id="video-' + uid + '" muted autoplay playsinline></video>' +
          '<div class="video-overlay" id="overlay-' + uid + '">Stream not active</div>' +
        '</div>' +
        '<div class="card-body">' +
          '<div id="info-' + uid + '"></div>' +
          '<div id="controls-' + uid + '"></div>' +
        '</div>';
      babiesEl.appendChild(card);
      fetchNotifSettings(uid);
    }
    return card;
  }

  function updateCard(uid, prev) {
    var b = babies[uid];
    if (!b) return;
    emptyState.style.display = 'none';

    var card = ensureCard(uid);
    var infoEl = document.getElementById('info-' + uid);
    var controlsEl = document.getElementById('controls-' + uid);
    var overlay = document.getElementById('overlay-' + uid);

    var s = b.sensors || {};
    var c = b.controls || {};

    // Resolve effective control values (pending overrides server until confirmed).
    var nlOn = getControlValue(uid, 'night_light', c.night_light);
    var pbOn = getControlValue(uid, 'playback', c.playback);
    var vol = getControlValue(uid, 'volume', c.volume || 0);

    var streamBadge = b.stream === 'active'
      ? '<span class="badge badge-green">stream active</span>'
      : b.stream === 'starting'
        ? '<span class="badge badge-amber">starting</span>'
        : '<span class="badge badge-red">stream stopped</span>';

    var wsBadge = b.ws_alive
      ? '<span class="badge badge-blue">ws connected</span>'
      : '<span class="badge badge-red">ws disconnected</span>';

    var pushBadge = b.push_active
      ? '<span class="badge badge-green">push alerts</span>'
      : '<span class="badge badge-amber">polling alerts</span>';

    var lastUpdate = s.last_update && s.last_update !== '0001-01-01T00:00:00Z'
      ? new Date(s.last_update).toLocaleTimeString()
      : 'no data yet';

    // Update info section (sensors, alerts) — safe to rebuild.
    infoEl.innerHTML =
      '<div class="card-header">' +
        '<div><h2>' + esc(b.name || uid) + '</h2>' +
        '<div class="uid">' + esc(uid) + '</div></div>' +
        '<div class="badges">' + streamBadge + wsBadge + pushBadge + '</div>' +
      '</div>' +
      '<div class="sensors">' +
        sensor('Temp', fmtNum(s.temperature, 1), '°C') +
        sensor('Humidity', fmtNum(s.humidity, 1), '%') +
        sensor('Light', fmtNum(s.light, 0), 'lx') +
      '</div>' +
      '<div class="alerts">' +
        alertItem('Night', s.is_night) +
        timedAlert('Cry', s.cry_detected, s.cry_detected_at) +
        timedAlert('Sound', s.sound_alert, s.sound_alert_at) +
        timedAlert('Motion', s.motion_alert, s.motion_alert_at) +
      '</div>' +
      '<div class="last-update">Last update: ' + lastUpdate + '</div>';

    var tracks = c.soundtracks || [];
    var curTrack = c.current_track || '';
    var pollSec = b.sensor_poll_sec || 30;
    var soundSensRaw = c.sound_sensitivity || 5;
    var motionSensRaw = c.motion_sensitivity || 130000;
    var soundSlider = Math.max(0, Math.min(7, 9 - soundSensRaw));
    var motionSlider = Math.max(0, Math.min(24, Math.round((250000 - motionSensRaw) / 10000)));

    var controlsChanged = !prev ||
      !prev.controls ||
      prev.controls.night_light !== c.night_light ||
      prev.controls.playback !== c.playback ||
      prev.controls.volume !== c.volume ||
      prev.controls.current_track !== c.current_track ||
      (prev.controls.soundtracks || []).length !== tracks.length;

    if (!controlsEl.hasChildNodes() || controlsChanged) {
      var trackOptions = '';
      for (var i = 0; i < tracks.length; i++) {
        var tName = tracks[i].name || '';
        var displayName = tName.replace(/\.wav$/i, '');
        var selected = tName === curTrack ? ' selected' : '';
        trackOptions += '<option value="' + esc(tName) + '"' + selected + '>' + esc(displayName) + '</option>';
      }
      var trackSelectHtml = tracks.length > 0
        ? '<select class="track-select" id="ctrl-track-' + uid + '">' + trackOptions + '</select>'
        : '<span class="track-label">no tracks</span>';

      controlsEl.innerHTML =
        // -- Camera Controls --
        '<div class="section-title">Camera Controls</div>' +
        '<div class="controls" style="margin-top:0; border-top:none; padding-top:0;">' +
          '<div class="control-item">' +
            '<span class="control-label">Night Light</span>' +
            '<button class="toggle ' + (nlOn ? 'on' : '') + '" id="ctrl-nl-' + uid + '"></button>' +
          '</div>' +
          '<div class="control-item">' +
            '<span class="control-label">Sound Machine</span>' +
            '<button class="toggle ' + (pbOn ? 'on' : '') + '" id="ctrl-pb-' + uid + '"></button>' +
          '</div>' +
          '<div class="control-item wide">' +
            '<span class="control-label">Track</span>' +
            trackSelectHtml +
          '</div>' +
          '<div class="control-item wide">' +
            '<span class="control-label">Volume</span>' +
            '<div class="volume-row">' +
              '<input type="range" class="volume-slider" id="ctrl-vol-' + uid + '" min="0" max="100" value="' + vol + '">' +
              '<span class="volume-val" id="ctrl-vol-val-' + uid + '">' + vol + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +

        // -- Notifications --
        '<div class="section-title" style="margin-top:0.5rem;">Notifications</div>' +
        '<div id="notif-cards-' + uid + '"></div>' +

        // -- Monitoring --
        '<div class="section-title" style="margin-top:0.5rem;">Monitoring</div>' +
        '<div class="controls" style="margin-top:0; border-top:none; padding-top:0;">' +
          '<div class="control-item wide">' +
            '<span class="control-label">Sensor Poll Interval</span>' +
            '<div class="volume-row">' +
              '<input type="range" class="volume-slider" id="ctrl-poll-' + uid + '" min="5" max="120" value="' + pollSec + '">' +
              '<span class="volume-val" id="ctrl-poll-val-' + uid + '">' + pollSec + 's</span>' +
            '</div>' +
          '</div>' +
        '</div>';

      var nlBtn = document.getElementById('ctrl-nl-' + uid);
      if (nlBtn) nlBtn.onclick = function() {
        var cur = this.classList.contains('on');
        var newVal = !cur;
        setPending(uid, 'night_light', newVal);
        sendControl(uid, 'night_light', newVal);
        this.classList.toggle('on', newVal);
      };

      var pbBtn = document.getElementById('ctrl-pb-' + uid);
      if (pbBtn) pbBtn.onclick = function() {
        var cur = this.classList.contains('on');
        var newVal = !cur;
        setPending(uid, 'playback', newVal);
        sendControl(uid, 'playback', newVal);
        this.classList.toggle('on', newVal);
      };

      var trackSel = document.getElementById('ctrl-track-' + uid);
      if (trackSel) trackSel.onchange = function() {
        sendControl(uid, 'select_track', this.value);
      };

      var volSlider = document.getElementById('ctrl-vol-' + uid);
      var volVal = document.getElementById('ctrl-vol-val-' + uid);
      if (volSlider) {
        volSlider.oninput = function() { volVal.textContent = this.value; };
        volSlider.onchange = function() {
          var v = parseInt(this.value);
          setPending(uid, 'volume', v);
          sendControl(uid, 'volume', v);
        };
      }

      var pollSlider = document.getElementById('ctrl-poll-' + uid);
      var pollVal = document.getElementById('ctrl-poll-val-' + uid);
      if (pollSlider) {
        pollSlider.oninput = function() { pollVal.textContent = this.value + 's'; };
        pollSlider.onchange = function() {
          sendControl(uid, 'sensor_poll', parseInt(this.value));
        };
      }

      renderNotifCards(uid, soundSlider, motionSlider);
    } else {
      var nlBtnSync = document.getElementById('ctrl-nl-' + uid);
      if (nlBtnSync) nlBtnSync.classList.toggle('on', nlOn);
      var pbBtnSync = document.getElementById('ctrl-pb-' + uid);
      if (pbBtnSync) pbBtnSync.classList.toggle('on', pbOn);
      var trackSelSync = document.getElementById('ctrl-track-' + uid);
      if (trackSelSync && curTrack) trackSelSync.value = curTrack;
      var soundSensEl = document.getElementById('ctrl-sound-sens-' + uid);
      if (soundSensEl) soundSensEl.value = soundSlider;
      var motionSensEl = document.getElementById('ctrl-motion-sens-' + uid);
      if (motionSensEl) motionSensEl.value = motionSlider;
    }

    var isActive = b.rtmp_active || b.stream === 'active';

    if (isActive && !players[uid]) {
      overlay.classList.add('hidden');
      startPlayer(uid);
    } else if (!isActive && players[uid]) {
      overlay.textContent = 'Stream not active';
      overlay.classList.remove('hidden');
      destroyPlayer(uid);
    } else if (!isActive) {
      overlay.textContent = 'Stream not active';
      overlay.classList.remove('hidden');
    }
  }

  function startPlayer(uid) {
    if (!mpegts.isSupported()) {
      console.warn('mpegts.js not supported in this browser');
      return;
    }
    var videoEl = document.getElementById('video-' + uid);
    if (!videoEl) return;

    var player = mpegts.createPlayer({
      type: 'flv',
      isLive: true,
      url: location.origin + '/api/stream/' + uid
    }, {
      enableWorker: true,
      liveBufferLatencyChasing: true,
      liveBufferLatencyMaxLatency: 1.5,
      liveBufferLatencyMinRemain: 0.3,
      lazyLoadMaxDuration: 1,
      deferLoadAfterSourceOpen: false
    });

    player.attachMediaElement(videoEl);
    player.load();
    player.play();

    player.on(mpegts.Events.ERROR, function() {
      setTimeout(function() {
        destroyPlayer(uid);
        if (babies[uid] && babies[uid].stream === 'active') {
          startPlayer(uid);
        }
      }, 2000);
    });

    players[uid] = player;
  }

  function destroyPlayer(uid) {
    if (players[uid]) {
      try {
        players[uid].pause();
        players[uid].unload();
        players[uid].detachMediaElement();
        players[uid].destroy();
      } catch(e) {}
      delete players[uid];
    }
  }

  function sensor(label, value, unit) {
    return '<div class="sensor">' +
      '<div class="sensor-label">' + label + '</div>' +
      '<div class="sensor-value">' + value + '<span class="sensor-unit">' + unit + '</span></div>' +
    '</div>';
  }

  function alertItem(label, active) {
    return '<div class="alert-item">' +
      '<div class="alert-dot ' + (active ? 'on' : 'off') + '"></div>' +
      label +
    '</div>';
  }

  function timedAlert(label, detected, detectedAt) {
    var active = false;
    var agoText = '';
    if (detected && detectedAt && detectedAt !== '0001-01-01T00:00:00Z') {
      var elapsed = (Date.now() - new Date(detectedAt).getTime()) / 1000;
      active = elapsed < 60;
      if (elapsed < 10) agoText = ' (just now)';
      else if (elapsed < 60) agoText = ' (' + Math.round(elapsed) + 's ago)';
      else if (elapsed < 3600) agoText = ' (' + Math.round(elapsed / 60) + 'm ago)';
    }
    return '<div class="alert-item">' +
      '<div class="alert-dot ' + (active ? 'on' : 'off') + '"></div>' +
      label + agoText +
    '</div>';
  }

  function fmtNum(v, decimals) {
    if (v == null || v === 0) return '--';
    return Number(v).toFixed(decimals);
  }

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  connect();
})();
</script>
</body>
</html>
